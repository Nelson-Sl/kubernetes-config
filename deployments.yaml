apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deployment-1
  labels:
    app: myapp
    tier: frontend
spec:
  selector:
    matchLabels:
      app: myapp
  replicas: 5
  template:
    metadata:
      name: nginx
      labels:
        app: myapp
    spec:
      containers:
      - name: nginx
        image: nginx


